$kind: http-request
name: Basic Chat Completion - Anthropic
description: "Generated from cURL: curl -X POST {{base_url}}/chat/completions -H \"api-key: {{api-key}}\" -H \"Content-Type: application/json\" -d '{\"model\":\"gpt-4o\",\"messages\":[{\"role\":\"user\",\"content\":\"Hello!\"}]}'"
url: "{{base_url}}/chat/completions"
method: POST
headers:
  api-key: "{{api-key}}"
  Content-Type: application/json
body:
  type: json
  content: "{\r

    \    \"model\": \"claude-haiku-4.5\",\r

    \    \"messages\": [\r

    \        {\r

    \            \"role\": \"user\",\r

    \            \"content\": \"Hello!\"\r

    \        }\r

    \    ]\r

    }"
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 200', function () {
          pm.response.to.have.status(200);
      })

      pm.test('Response has id field', function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property('id');
      })

      pm.test('Response has choices array', function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property('choices').that.is.an('array').with.length.above(0);
      })

      pm.test('First choice has message with content', function () {
          const json = pm.response.json();
          pm.expect(json.choices[0]).to.have.property('message');
          pm.expect(json.choices[0].message).to.have.property('content').that.is.a('string');
      })

      pm.test('Response has usage object', function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property('usage');
          pm.expect(json.usage).to.have.property('total_tokens').that.is.a('number');
      })

      pm.test('Response has model field', function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property('model').that.is.a('string');
      })
    language: text/javascript
order: 2000
