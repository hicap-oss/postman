$kind: http-request
name: Basic Responses
description: "Generated from cURL: curl -X POST {{base_url}}/v1/responses -H \"api-key: {{api-key}}\" -H \"Content-Type: application/json\" -d '{\"model\":\"gpt-5.4\",\"input\":[{\"role\":\"user\",\"content\":\"Hello!\"}]}'"
url: "{{base_url}}/responses"
method: POST
headers:
  api-key: "{{api-key}}"
  Content-Type: application/json
body:
  type: json
  content: "{\r

    \    \"model\": \"gpt-5-mini\",\r

    \    \"input\": [\r

    \        {\r

    \            \"role\": \"user\",\r

    \            \"content\": \"Hello!\"\r

    \        }\r

    \    ]\r

    }"
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 200', function () {
          pm.response.to.have.status(200);
      })

      pm.test('Response has id field', function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property('id');
      })

        pm.test('Response has output array', function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property('output').that.is.an('array').with.length.above(0);
      })

        pm.test('First output item has content', function () {
          const json = pm.response.json();
          pm.expect(json.output[0]).to.have.property('content').that.is.an('array');
      })

      pm.test('Response has usage object', function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property('usage');
      })

      pm.test('Response has model field', function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property('model').that.is.a('string');
      })
    language: text/javascript
order: 5000
