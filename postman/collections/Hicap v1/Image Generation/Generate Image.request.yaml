    \    \"model\": \"gpt-4o\",\r

    \    \"prompt\": \"A futuristic city skyline at sunset\",\r

    \    \"n\": 1,\r

    \    \"size\": \"1024x1024\",\r

    \    \"quality\": \"standard\",\r

    \    \"response_format\": \"url\"\r

    }"
