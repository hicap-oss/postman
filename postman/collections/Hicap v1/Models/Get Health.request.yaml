$kind: http-request
name: Get Health
description: 'Generated from cURL: curl -X GET "{{base_url}}/status-0123456789abcdef" -H "api-key: {{api-key}}"'
url: "{{base_url}}/status-0123456789abcdef"
method: GET
headers:
  api-key: "{{api-key}}"
  Content-Type: application/json
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 200', function () {
          pm.response.to.have.status(200);
      })

      pm.test('Response body is not empty', function () {
          pm.expect(pm.response.text()).to.have.length.above(0);
      })

      pm.test('Response content type is present when provided', function () {
          const contentType = pm.response.headers.get('Content-Type');
          if (contentType !== null) {
              pm.expect(contentType).to.be.a('string').and.to.have.length.above(0);
          }
      })
    language: text/javascript
order: 2000
