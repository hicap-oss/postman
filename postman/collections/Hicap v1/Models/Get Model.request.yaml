$kind: http-request
name: Get Model
description: 'Generated from cURL: curl -X GET "{{base_url}}/models/gpt-4o" -H
  "api-key: {{api-key}}"'
url: "{{base_url}}/models/gpt-4o"
method: GET
headers:
  api-key: "{{api-key}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 200', function () {
          pm.response.to.have.status(200);
      });

      pm.test('Response has object type model', function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property('object').that.equals('model');
      });

      pm.test('Response has id field', function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property('id').that.is.a('string');
      });

      pm.test('Response has owned_by field', function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property('owned_by').that.is.a('string');
      });

      pm.test('Response content type is JSON', function () {
          pm.expect(pm.response.headers.get('Content-Type')).to.include('application/json');
      });
    language: text/javascript
order: 3000
